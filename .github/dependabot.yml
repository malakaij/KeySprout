version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
    # Group minor + patch updates into one PR per ecosystem to cut noise.
    # Major bumps are intentionally ungrouped — they need individual review.
    groups:
      npm-minor-patch:
        update-types:
          - minor
          - patch
    commit-message:
      prefix: deps
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - ci
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch
    commit-message:
      prefix: ci
      include: scope
